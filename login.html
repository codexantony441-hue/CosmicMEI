<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CosmicMEI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: white;
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.3);
        }

        .logo-section h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            color: white;
            margin-bottom: 4px;
        }

        .logo-section p {
            color: #a0aec0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #a0aec0;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: #0f0f1a;
            border: 1px solid #2d3748;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #6c5ce7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:focus ~ i {
            color: #a29bfe;
        }

        .input-wrapper input::placeholder {
            color: #4a5568;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a0aec0;
            font-size: 13px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            accent-color: #6c5ce7;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: #a29bfe;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #6c5ce7;
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c5ce7, #5c4cd9);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #4a5568;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2d3748;
        }

        .divider span {
            padding: 0 16px;
        }

        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid #2d3748;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .social-btn:hover {
            background: #1a1a2e;
            border-color: #6c5ce7;
        }

        .social-btn i {
            font-size: 18px;
        }

        .google-btn i { color: #ea4335; }
        .apple-btn i { color: #a0aec0; }

        .register-link {
            text-align: center;
            margin-top: 24px;
            color: #a0aec0;
            font-size: 14px;
        }

        .register-link a {
            color: #a29bfe;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .register-link a:hover {
            color: #6c5ce7;
            text-decoration: underline;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .alert-error {
            background: rgba(225, 112, 85, 0.15);
            border: 1px solid rgba(225, 112, 85, 0.3);
            color: #e17055;
        }

        .alert-success {
            background: rgba(0, 184, 148, 0.15);
            border: 1px solid rgba(0, 184, 148, 0.3);
            color: #00b894;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 24px;
            }
            .social-login {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-rocket"></i>
                </div>
                <h1>CosmicMEI</h1>
                <p>Acesse sua conta para continuar</p>
            </div>

            <!-- Alertas -->
            <div class="alert alert-error" id="alertError" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="alertErrorMessage"></span>
            </div>
            <div class="alert alert-success" id="alertSuccess" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <span id="alertSuccessMessage"></span>
            </div>

            <!-- Formulário de Login -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>E-mail</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="seu@email.com" 
                            required
                            autocomplete="email"
                        >
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Sua senha" 
                            required
                            autocomplete="current-password"
                        >
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        Lembrar-me
                    </label>
                    <a href="#" class="forgot-password" onclick="esqueciSenha(event)">Esqueci a senha?</a>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span id="btnLoginText">Entrar na Plataforma</span>
                    <span id="btnLoginSpinner" class="loading-spinner" style="display: none;"></span>
                </button>
            </form>

            <!-- Divisor -->
            <div class="divider">
                <span>ou continue com</span>
            </div>

            <!-- Login Social -->
            <div class="social-login">
                <button class="social-btn google-btn" onclick="loginComGoogle()">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn apple-btn" onclick="loginComApple()">
                    <i class="fab fa-apple"></i> Apple
                </button>
            </div>

            <!-- Link para cadastro -->
            <div class="register-link">
                <p>Não tem uma conta? <a href="cadastro.html">Crie sua conta grátis</a></p>
            </div>
        </div>

        <!-- Links adicionais -->
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #a0aec0; text-decoration: none; font-size: 13px; transition: color 0.3s;">
                <i class="fas fa-arrow-left"></i> Voltar para o site
            </a>
        </div>
    </div>

    <script>
        // Verificar se há usuário logado
        document.addEventListener('DOMContentLoaded', () => {
            // Se já estiver logado, redireciona para o dashboard
            const loggedUser = localStorage.getItem('cosmicmei_logged_user');
            if (loggedUser) {
                window.location.href = 'dashboard.html';
                return;
            }

            // Verifica se veio do cadastro com sucesso
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('cadastro') === 'sucesso') {
                showSuccess('Conta criada com sucesso! Faça login para continuar.');
                // Limpa a URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            if (urlParams.get('senha') === 'alterada') {
                showSuccess('Senha alterada com sucesso! Faça login com sua nova senha.');
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // Carrega email salvo se "lembrar-me" foi marcado
            const savedEmail = localStorage.getItem('cosmicmei_remember_email');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        function showError(message) {
            const alert = document.getElementById('alertError');
            const msg = document.getElementById('alertErrorMessage');
            msg.textContent = message;
            alert.style.display = 'flex';
            document.getElementById('alertSuccess').style.display = 'none';
        }

        function showSuccess(message) {
            const alert = document.getElementById('alertSuccess');
            const msg = document.getElementById('alertSuccessMessage');
            msg.textContent = message;
            alert.style.display = 'flex';
            document.getElementById('alertError').style.display = 'none';
        }

        function hideAlerts() {
            document.getElementById('alertError').style.display = 'none';
            document.getElementById('alertSuccess').style.display = 'none';
        }

        function setLoading(loading) {
            const btn = document.getElementById('btnLogin');
            const text = document.getElementById('btnLoginText');
            const spinner = document.getElementById('btnLoginSpinner');
            
            if (loading) {
                btn.disabled = true;
                text.style.display = 'none';
                spinner.style.display = 'inline-block';
            } else {
                btn.disabled = false;
                text.style.display = 'inline';
                spinner.style.display = 'none';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            hideAlerts();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Validações básicas
            if (!email) {
                showError('Por favor, informe seu e-mail.');
                return;
            }

            if (!password) {
                showError('Por favor, informe sua senha.');
                return;
            }

            if (password.length < 6) {
                showError('A senha deve ter pelo menos 6 caracteres.');
                return;
            }

            setLoading(true);

            // Simula verificação de login (substituir por Firebase Auth ou API)
            setTimeout(() => {
                // Busca usuários cadastrados
                const users = JSON.parse(localStorage.getItem('cosmicmei_users')) || [];
                const user = users.find(u => u.email === email);

                // Também verifica se foi cadastrado via cadastro.html (formato antigo)
                const singleUser = JSON.parse(localStorage.getItem('cosmicmei_user'));

                if (user && user.password === password) {
                    // Login bem-sucedido (usuário do array)
                    finalizarLogin(user, rememberMe);
                } else if (singleUser && singleUser.email === email && singleUser.password === password) {
                    // Login bem-sucedido (usuário único)
                    finalizarLogin(singleUser, rememberMe);
                } else if (user && user.password !== password) {
                    setLoading(false);
                    showError('Senha incorreta. Tente novamente.');
                } else if (singleUser && singleUser.email === email && singleUser.password !== password) {
                    setLoading(false);
                    showError('Senha incorreta. Tente novamente.');
                } else {
                    setLoading(false);
                    showError('E-mail não encontrado. Verifique ou crie uma conta.');
                }
            }, 1500);
        }

        function finalizarLogin(user, rememberMe) {
            // Salva sessão do usuário
            const loggedUser = {
                name: user.name,
                email: user.email,
                cnpj: user.cnpj || '',
                cpf: user.cpf || '',
                plano: user.plano || 'Start',
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('cosmicmei_logged_user', JSON.stringify(loggedUser));

            // Lembrar e-mail
            if (rememberMe) {
                localStorage.setItem('cosmicmei_remember_email', user.email);
            } else {
                localStorage.removeItem('cosmicmei_remember_email');
            }

            // Redireciona para o dashboard
            window.location.href = 'dashboard.html';
        }

        function esqueciSenha(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                showError('Digite seu e-mail para recuperar a senha.');
                return;
            }

            // Simula envio de e-mail de recuperação
            alert('📧 Enviamos um link de recuperação para: ' + email + '\n\nVerifique sua caixa de entrada e spam.');
        }

        function loginComGoogle() {
            alert('🔜 Login com Google será implementado em breve!\n\nPor enquanto, use seu e-mail e senha.');
        }

        function loginComApple() {
            alert('🔜 Login com Apple será implementado em breve!\n\nPor enquanto, use seu e-mail e senha.');
        }

        // Permite enviar o formulário pressionando Enter
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
